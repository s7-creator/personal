
<!DOCTYPE html>
<html>

<script type="text/javascript">
  			
  	var allNumbers;

	function generate() {

		if (typeof(Storage) == "undefined") {
			alert("Sorry, this game does not work on your mobile/laptop.");
			return;
		} 

		load();

		if(allNumbers.length == 90) {
			alert("Game complete");
			return;
		}

		let x = 100;	
		do {
		 	x = Math.floor((Math.random() * 100) + 1);

		}while(x >90 || allNumbers.includes(x));

		allNumbers.push(x);
		save();
		print();
	}

	function clearGame() {
			let passwd = prompt(`Type "clear" then press ok`);
			if( passwd != "clear")  {
				alert("Please type correctly");
				return;
			}

				localStorage.clear();
				
		
				print();
				document.getElementById("randomNumber").innerHTML = `Game cleared`;

	}


	

	function load() {
		allNumbers=JSON.parse(localStorage.getItem('allNumbers'));
		if(allNumbers == null) {
			allNumbers = [];
		}

	}

	function save() {
		localStorage.setItem('allNumbers', JSON.stringify(allNumbers));
	}

	function print() {
		load();

		// last 5 numbers
		var st ='';
		var i=0;
		var c = allNumbers.length-1;
		if(c >=0) {
			x= allNumbers[allNumbers.length-1]
		document.getElementById("randomNumber").innerHTML = `Next number is <span style="background-color:yellow;">${x}</span>`;
		do {
			n=allNumbers[c];
			if(i==0) {	
				st += `: ${n}`
			} else {
				st += `, ${n}`	
			}
			
			i++;
			c--;

		} while(i<5 && c >=0)
		}
		document.getElementById("lastFiveNumbers").innerHTML = `Last Five Numbers are ${st}`;

		const grid = document.getElementById('grid');
		grid.replaceChildren();
        
        for (let i = 1; i <= 90; i++) {
            const div = document.createElement('div');
            div.textContent = i;
            div.classList.add('number-box');
            
            // Highlight number 77
           if(allNumbers.includes(i)) {
                div.classList.add('highlight');
           
            }
            
            grid.appendChild(div);
        }

	}

	window.onload = print;


</script>


<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Tambola</title>


	<style>
        .grid-container {
            display: grid;
            width: 90%;
            /* Creates 10 columns */
            grid-template-columns: repeat(10, 1fr); 
            gap: 6px;
        }
        .number-box {
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: white;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-weight: bold;
        }
        .highlight {
            background-color: blue;
            color: white;
            border-color: blue;
        }
    </style>


</head>


<body>
	<h2>Tambola numbers generator</h2></br>
	<button onclick="generate()">Next number</button>
    <button onclick="clearGame()">Clear game</button>
	<div id="randomNumber" style="color:blue; font-size:30px; font-weight:bold; margin: 10px 0;">--</div>
	<div style="font-size:18px;">Last 5 numbers:</div>
    <div id="lastFiveNumbers" style="color:blue; font-size:24px; min-height: 30px;"></div>
	<div class="grid-container" id="grid"></div>

</body>



</html>
